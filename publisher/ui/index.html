<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="publisher-token" content="__PUBLISHER_TOKEN__" />
    <title>WA Publisher</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div><span class="mark">WA</span><strong>Publisher</strong></div>
      <div class="local-badge">● Local only · 127.0.0.1</div>
    </header>
    <main class="shell">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div><span class="eyebrow">Claudian Vault</span><h1>选择一篇笔记</h1></div>
          <button id="refresh" class="icon-button" title="刷新笔记">↻</button>
        </div>
        <input id="search" class="search" type="search" placeholder="搜索标题或路径…" />
        <div id="note-list" class="note-list"><div class="empty">正在读取 Vault…</div></div>
      </aside>

      <section class="workspace">
        <div id="welcome" class="welcome">
          <div class="welcome-icon">✦</div>
          <h2>把整理好的笔记送上网站</h2>
          <p>选中左侧笔记，补齐公开信息，预览确认后再发布。</p>
        </div>

        <div id="editor" class="editor hidden">
          <div class="editor-head">
            <div><span class="eyebrow" id="source-path"></span><h2 id="editor-title">准备发布</h2></div>
            <div class="actions">
              <button id="preview-button" class="button secondary">刷新预览</button>
              <button id="publish-button" class="button primary">确认并发布</button>
            </div>
          </div>

          <div class="columns">
            <form id="metadata-form" class="panel form-panel">
              <h3>公开信息</h3>
              <label>标题<input name="title" required /></label>
              <div class="field-row">
                <label>日期<input name="date" type="date" required /></label>
                <label>分类<select name="category"><option>算法笔记</option><option>课程笔记</option><option>项目记录</option><option>周报/碎碎念</option></select></label>
              </div>
              <label>标签<input name="tags" placeholder="GCD, 数论, 动态规划" /></label>
              <label>网址文件名<input name="slug" required /><small>建议英文或简短拼音；发布后尽量不要修改。</small></label>
              <label>简介<textarea name="description" rows="3" required></textarea></label>
              <details>
                <summary>题解扩展字段</summary>
                <div class="field-row detail-fields">
                  <label>平台<input name="platform" /></label>
                  <label>难度<input name="difficulty" /></label>
                </div>
                <label>状态<select name="status"><option value="">不显示</option><option>已通过</option><option>进行中</option><option>待复盘</option></select></label>
              </details>
              <div id="dependency-box" class="dependency-box hidden">
                <h3>关联笔记</h3>
                <p>当前文章引用了尚未公开的笔记。勾选表示同意一并公开。</p>
                <div id="dependencies"></div>
              </div>
              <div id="warning-box" class="warning-box hidden"></div>
            </form>

            <section class="panel preview-panel">
              <div class="preview-head"><h3>网站预览</h3><span>Markdown · KaTeX · Wiki Links</span></div>
              <article id="preview" class="prose"><div class="empty">点击“刷新预览”查看效果。</div></article>
            </section>
          </div>
          <div class="status-row"><div id="status" class="status" aria-live="polite"></div><button id="retry-push" class="button secondary hidden">重试推送</button></div>
        </div>
      </section>
    </main>

    <dialog id="confirm-dialog">
      <form method="dialog">
        <span class="eyebrow">Final check</span>
        <h2>确认公开到网站？</h2>
        <p id="confirm-summary"></p>
        <div class="dialog-note">确认后会执行内容检查、完整构建、Git 提交并推送。其他草稿和 Claudian 配置不会上传。</div>
        <div class="dialog-actions"><button value="cancel" class="button secondary">再看看</button><button id="dialog-publish" value="default" class="button primary">公开并推送</button></div>
      </form>
    </dialog>
    <script type="module" src="/app.js"></script>
  </body>
</html>
